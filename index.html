<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyWorship Formatter | Citam Rongai</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Orbitron:wght@400;700&family=Poppins:wght@700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="bg-animation">
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
    </div>


    <div id="skeleton-screen" class="skeleton-overlay">
        <div class="skeleton-header">
            <div class="skeleton-title shimmer"></div>
            <div class="skeleton-subtitle shimmer"></div>
        </div>
        <div class="skeleton-body">
            <div class="skeleton-card shimmer"></div>
            <div class="skeleton-label shimmer"></div>
            <div class="skeleton-textarea shimmer"></div>
            <div class="skeleton-controls shimmer"></div>
            <div class="skeleton-label shimmer"></div>
            <div class="skeleton-textarea shimmer"></div>
            <div class="skeleton-footer-placeholder shimmer"></div>
        </div>
    </div>

    <main class="main-content" id="app-content" style="opacity: 0; visibility: hidden;">

        <header class="header">
            <h1 class="glitch" data-text="CITAM RONGAI">CITAM RONGAI</h1>
            <p class="subtitle">Lyrics Formatter</p>
        </header>

        <section class="instructions-card">
            <div class="card-content">
                <p>Format your song lyrics for EasyWorship instantly. Paste your raw lyrics below, and we'll split them
                    into professional 4-line slides ready for the big screen.</p>
            </div>
        </section>

        <div class="formatter-container">
            <div class="input-group">
                <label for="InputLyrics">Raw Lyrics</label>
                <textarea id="InputLyrics"
                    placeholder="Paste your lyrics here (e.g. from Google or Word)..."></textarea>
            </div>

            <div class="controls">
                <button onclick="FormatLyrics()" class="btn-primary">
                    <span class="btn-text">Format for EasyWorship</span>
                    <span class="btn-glow"></span>
                </button>
                <button onclick="copyToClipboard()" class="btn-secondary">
                    <span class="btn-text">Copy Results</span>
                </button>
            </div>

            <div class="output-group">
                <label for="outputLyrics">Formatted Slides</label>
                <textarea id="outputLyrics" readonly placeholder="Formatted slides will appear here..."></textarea>
            </div>
        </div>

        <footer class="info-footer">
            <div class="note-badge">NOTE</div>
            <p>Streamlining worship operations for leaders and media teams.</p>
        </footer>

        <footer class="bottom-footer">
            <p>© 2026 Citam Rongai Media Operations</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>

</html>
